<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smash It - Pro Contagem | Gestão de Stock</title>
    <!-- Tailwind + Font Awesome + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --smash-yellow: #facc15;
            --smash-dark: #050505;
            --card-border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b0b0b, #000000);
            color: #f1f5f9;
        }

        /* scroll suave */
        html {
            scroll-behavior: smooth;
        }

        .brand-font {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        /* glassmorphismo premium */
        .card-glass {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card-glass:hover {
            border-color: rgba(250, 204, 21, 0.2);
            background: rgba(20, 20, 28, 0.8);
        }

        .btn-smash {
            background: linear-gradient(105deg, #facc15 0%, #eab308 100%);
            color: #0c0a2a;
            font-weight: 800;
            transition: transform 0.15s ease, box-shadow 0.2s;
            box-shadow: 0 8px 20px -6px rgba(250, 204, 21, 0.2);
        }

        .btn-smash:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px -4px rgba(250, 204, 21, 0.4);
        }

        /* modal animado */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal.active {
            display: flex;
            animation: modalFade 0.25s ease-out;
        }

        @keyframes modalFade {
            from { opacity: 0; backdrop-filter: blur(0px);}
            to { opacity: 1; backdrop-filter: blur(10px);}
        }

        .animate-in {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* remove setas do input number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* botão edição activo */
        .edit-active {
            background: #facc15 !important;
            color: black !important;
            transform: rotate(90deg);
            box-shadow: 0 0 0 2px rgba(250,204,21,0.3);
        }

        /* botão ação especial */
        .action-btn-icon {
            transition: all 0.2s ease;
        }
        .action-btn-icon:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body class="min-h-screen pb-44 antialiased">

    <!-- HEADER FIXO + SEARCH + NOVOS BOTÕES DE AÇÃO -->
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-2xl border-b border-white/10 shadow-lg">
        <div class="max-w-xl mx-auto px-4 pt-5 pb-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-baseline gap-2">
                    <h1 class="text-4xl btn-smash px-4 py-1 rounded-2xl shadow-md brand-font tracking-wider">SMASH IT</h1>
                    <span class="text-[10px] font-bold text-yellow-500/80 uppercase tracking-[0.3em]">pro</span>
                </div>
                <div class="flex gap-3">
                    <!-- Botão Modo Edição -->
                    <button id="btn-edit-mode" onclick="toggleEditMode()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50">
                        <i class="fas fa-cog text-base"></i>
                    </button>
                    
                    <!-- Botão LIMPAR ITENS MARCADOS (zera todas as quantidades) -->
                    <button onclick="confirmClearChecked()" class="w-11 h-11 rounded-full bg-amber-600/20 text-amber-400 flex items-center justify-center border border-amber-500/40 hover:bg-amber-500/30 transition-all" title="Limpar todas as quantidades">
                        <i class="fas fa-eraser text-base"></i>
                    </button>
                    
                    <!-- Botão REDEFINIÇÃO GERAL (configurações originais) -->
                    <button onclick="confirmFullReset()" class="w-11 h-11 rounded-full bg-red-600/20 text-red-400 flex items-center justify-center border border-red-500/40 hover:bg-red-500/30 transition-all" title="Redefinir tudo - categorias originais">
                        <i class="fas fa-arrow-rotate-left text-base"></i>
                    </button>
                </div>
            </div>
            
            <!-- Barra de pesquisa -->
            <div class="relative mt-1">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="text" id="search-input" oninput="render()" placeholder="🔎 Pesquisar item ou categoria..." 
                       class="w-full bg-white/5 border border-white/10 h-12 pl-12 pr-5 rounded-2xl outline-none text-sm focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500/50 transition-all">
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-xl mx-auto px-4 py-5 space-y-8">
        
        <!-- Painel de gestão (edição) -->
        <div id="management-zone" class="hidden animate-in bg-yellow-500/5 border border-yellow-500/25 rounded-3xl p-5 backdrop-blur-sm">
            <div class="flex items-center gap-2 mb-3">
                <i class="fas fa-screwdriver-wrench text-yellow-400 text-sm"></i>
                <h3 class="text-yellow-400 text-[11px] font-black uppercase tracking-[0.2rem]">Modo Gestão</h3>
            </div>
            <button onclick="openCategoryModal()" class="w-full bg-yellow-500 text-black font-extrabold py-3.5 rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-2 shadow-md active:scale-[0.98] transition">
                <i class="fas fa-layer-group"></i> Criar nova categoria
            </button>
            <p class="text-[10px] text-gray-400 text-center mt-3">✦ Toque nos itens para editar ou adicionar</p>
        </div>

        <!-- Inventário dinâmico -->
        <div id="inventory-container" class="space-y-8"></div>

        <!-- Bloco de notas premium -->
        <div class="card-glass rounded-3xl p-5 mt-4">
            <div class="flex items-center gap-3 mb-3 px-1">
                <div class="w-6 h-6 rounded-full bg-yellow-500/20 flex items-center justify-center">
                    <i class="fas fa-sticky-note text-yellow-400 text-[11px]"></i>
                </div>
                <label class="font-bold uppercase text-[10px] tracking-[0.2em] text-gray-400">Relatório / Observações</label>
            </div>
            <textarea id="notes" rows="3" oninput="saveNotes()" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 focus:border-yellow-500/60 outline-none text-white/90 text-sm resize-none placeholder:text-gray-500" placeholder="📝 Ex: Urgente reabastecer pães, promoção smash duplo..."></textarea>
        </div>
    </main>

    <!-- BOTÃO FLUTUANTE WHATSAPP -->
    <div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-black via-black/95 to-transparent z-40">
        <div class="max-w-xl mx-auto">
            <button onclick="sendToWhatsApp()" class="w-full btn-smash font-bold h-16 rounded-2xl text-sm uppercase tracking-[0.15em] flex items-center justify-center gap-3 shadow-2xl shadow-yellow-500/20 active:scale-[0.98] transition-all">
                <i class="fab fa-whatsapp text-2xl"></i>
                GERAR RELATÓRIO & ENVIAR
            </button>
        </div>
    </div>

    <!-- MODAL UNIVERSAL -->
    <div id="modal-container" class="modal px-5">
        <div class="card-glass p-6 rounded-[2.5rem] w-full max-w-sm border border-yellow-500/30 shadow-2xl animate-in">
            <div class="text-center mb-2">
                <h3 id="modal-title" class="text-2xl font-black text-yellow-500 brand-font uppercase tracking-wide">Ação</h3>
                <div class="w-12 h-0.5 bg-yellow-500/50 mx-auto mt-1 rounded-full"></div>
            </div>
            <div id="modal-content" class="space-y-5 my-4"></div>
            <div class="flex gap-3 mt-4">
                <button onclick="closeModal()" class="flex-1 h-12 bg-white/10 rounded-xl font-bold text-gray-300 text-xs uppercase tracking-wider hover:bg-white/15 transition">Cancelar</button>
                <button id="modal-confirm" class="flex-1 btn-smash h-12 rounded-xl font-bold text-xs uppercase tracking-wider shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // DADOS INICIAIS (default original) - Usado para reset geral
        // --------------------------------------------------------------
        const DEFAULT_CATEGORIES = [
            { id: 101, name: "🍔 Pães Artesanais", items: ["Pão Batata", "Pão Pimenta", "Esmagadinho", "Outros"] },
            { id: 102, name: "🥩 Proteínas Smash", items: ["Carne 100g Caixa", "Blend de Queijos", "Frango Empanado", "Bacon Pacote"] },
            { id: 103, name: "🥬 Frescos & Veg", items: ["Alface", "Tomate Unidade", "Cebola Caramelizada", "Picles Caseiros", "Veggie", "Futuro"] },
            { id: 104, name: "🧀 Queijos e Molhos", items: ["Cheddar Barra", "Prato Barra", "Molho Gravy", "Molho Heinzen", "Molho de Pimenta", "Maionese da Casa"] }
        ];

        // Carrega ou inicializa storage
        let inventory = JSON.parse(localStorage.getItem('smash_inventory_pro'));
        if (!inventory || inventory.length === 0) {
            inventory = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)); // clone profundo
            localStorage.setItem('smash_inventory_pro', JSON.stringify(inventory));
        }

        let counts = JSON.parse(localStorage.getItem('smash_counts_pro')) || {};
        let isEditMode = false;

        // Helper: salvar tudo
        function persistData() {
            localStorage.setItem('smash_inventory_pro', JSON.stringify(inventory));
            localStorage.setItem('smash_counts_pro', JSON.stringify(counts));
        }

        // Notas
        function saveNotes() {
            const notes = document.getElementById('notes').value;
            localStorage.setItem('smash_notes_pro', notes);
        }
        function loadNotes() {
            const savedNote = localStorage.getItem('smash_notes_pro');
            if (savedNote !== null) document.getElementById('notes').value = savedNote;
        }

        // Alternar modo edição (UI + render)
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const editBtn = document.getElementById('btn-edit-mode');
            const mgmtZone = document.getElementById('management-zone');
            
            if(isEditMode) {
                editBtn.classList.add('edit-active');
                mgmtZone.classList.remove('hidden');
            } else {
                editBtn.classList.remove('edit-active');
                mgmtZone.classList.add('hidden');
            }
            render();
        }

        // Renderização principal com filtro e quantidades
        function render() {
            const container = document.getElementById('inventory-container');
            if (!container) return;
            const searchTerm = document.getElementById('search-input')?.value.toLowerCase().trim() || '';
            container.innerHTML = '';

            inventory.forEach(category => {
                // Filtra itens baseado no search (nome da categoria ou nome do item)
                let filteredItems = category.items.filter(item => 
                    item.toLowerCase().includes(searchTerm) || category.name.toLowerCase().includes(searchTerm)
                );
                
                // Se a categoria tiver correspondência apenas pelo nome mas nenhum item específico, mostramos todos
                if (category.name.toLowerCase().includes(searchTerm) && filteredItems.length === 0) {
                    filteredItems = [...category.items];
                }
                
                if (filteredItems.length === 0) return;

                // Montar HTML da categoria
                const catDiv = document.createElement('div');
                catDiv.className = 'animate-in space-y-3';
                
                // Header da categoria
                let headerHtml = `
                    <div class="flex justify-between items-end px-1 pb-1">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-tag text-yellow-500/70 text-[10px]"></i>
                            <h2 class="text-yellow-500 font-extrabold uppercase text-[11px] tracking-[0.2em]">${escapeHtml(category.name)}</h2>
                        </div>
                `;
                if (isEditMode) {
                    headerHtml += `
                        <div class="flex gap-4 text-[9px] font-black uppercase tracking-tight">
                            <button onclick="openItemModal(${category.id})" class="text-emerald-400 hover:text-emerald-300 transition flex items-center gap-1"><i class="fas fa-plus-circle text-[9px]"></i> Item</button>
                            <button onclick="openCategoryModal(${category.id})" class="text-blue-400 hover:text-blue-300"><i class="fas fa-pen"></i> Editar</button>
                            <button onclick="confirmDeleteCategory(${category.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash-can"></i> Apagar</button>
                        </div>
                    `;
                }
                headerHtml += `</div>`;
                
                // Lista de itens
                let itemsHtml = `<div class="grid gap-2.5">`;
                filteredItems.forEach(item => {
                    const key = `${category.id}-${item}`;
                    const quantity = counts[key] || 0;
                    itemsHtml += `
                        <div class="card-glass p-4 rounded-2xl flex items-center justify-between group transition-all">
                            <div class="flex flex-col gap-0.5">
                                <span class="font-semibold text-[15px] tracking-tight text-gray-100">${escapeHtml(item)}</span>
                                ${isEditMode ? `
                                    <div class="flex gap-4 mt-0.5">
                                        <button onclick="openItemModal(${category.id}, '${escapeHtml(item)}')" class="text-[9px] font-black uppercase text-blue-400/70 hover:text-blue-400 transition">✎ Renomear</button>
                                        <button onclick="confirmDeleteItem(${category.id}, '${escapeHtml(item)}')" class="text-[9px] font-black uppercase text-red-400/70 hover:text-red-400 transition">🗑 Remover</button>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="flex items-center gap-3 bg-black/30 rounded-2xl p-1.5">
                                <button onclick="updateCount('${key}', -1)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center active:bg-red-500/20 transition-all text-gray-300 hover:bg-white/10">
                                    <i class="fas fa-minus text-xs"></i>
                                </button>
                                <input type="number" value="${quantity}" 
                                       onchange="manualUpdate('${key}', this.value)"
                                       class="w-12 bg-transparent text-center font-bold text-yellow-500 focus:outline-none text-xl"
                                       id="input-${key}" inputmode="numeric">
                                <button onclick="updateCount('${key}', 1)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center active:bg-green-500/20 transition-all text-gray-300 hover:bg-white/10">
                                    <i class="fas fa-plus text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                itemsHtml += `</div>`;
                catDiv.innerHTML = headerHtml + itemsHtml;
                container.appendChild(catDiv);
            });
            
            // Se não houver nenhuma categoria após filtro
            if (container.children.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400 text-sm card-glass rounded-3xl p-8"><i class="fas fa-box-open text-4xl mb-3 opacity-50"></i><p>Nenhum item encontrado.<br>🔍 Tente outro termo ou adicione categorias.</p></div>`;
            }
        }

        // Utilitário anti-XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Manipulação de contagem
        function updateCount(key, delta) {
            const current = counts[key] || 0;
            const newVal = Math.max(0, current + delta);
            counts[key] = newVal;
            const inputEl = document.getElementById(`input-${key}`);
            if (inputEl) inputEl.value = newVal;
            persistData();
        }

        function manualUpdate(key, valueStr) {
            let raw = parseInt(valueStr, 10);
            if (isNaN(raw)) raw = 0;
            counts[key] = Math.max(0, raw);
            persistData();
            const inputEl = document.getElementById(`input-${key}`);
            if (inputEl) inputEl.value = counts[key];
        }

        // ==============================================================
        // NOVOS BOTÕES: 1) LIMPAR ITENS MARCADOS (Zerar contagens) 
        //               2) REDEFINIÇÃO GERAL (configurações originais)
        // ==============================================================
        
        // 1) Limpar todas as quantidades (itens marcados / contagens)
        function confirmClearChecked() {
            document.getElementById('modal-title').innerText = '🧹 Limpar Quantidades';
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center space-y-2">
                    <i class="fas fa-broom-ball text-3xl text-amber-400"></i>
                    <p class="text-sm font-medium">Apagar TODOS os números de stock?</p>
                    <p class="text-[11px] text-gray-400">As contagens de todos os itens voltarão a zero.<br>Categorias e itens permanecem intactos.</p>
                </div>
            `;
            document.getElementById('modal-confirm').onclick = () => {
                counts = {};   // zera todas as quantidades
                persistData();
                closeModal();
                render();
            };
            openModal();
        }
        
        // 2) Redefinição geral: restaura categorias e itens originais, zera contagens e notas
        function confirmFullReset() {
            document.getElementById('modal-title').innerText = '⚠️ RESET COMPLETO';
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center space-y-3">
                    <i class="fas fa-database text-3xl text-red-500 animate-pulse"></i>
                    <p class="text-sm font-bold text-white">Redefinir para configurações originais?</p>
                    <div class="bg-red-500/10 p-3 rounded-xl text-left text-[12px]">
                        <i class="fas fa-circle-info text-red-400 mr-1"></i> Isto irá:<br>
                        • Restaurar categorias e itens padrão<br>
                        • Zerar TODAS as quantidades contadas<br>
                        • Limpar notas/observações<br>
                        • Remover categorias/itens personalizados
                    </div>
                </div>
            `;
            document.getElementById('modal-confirm').onclick = () => {
                // Reset completo: categorias originais (clone profundo)
                inventory = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
                counts = {};   // todas as contagens zeradas
                // Limpar notas também
                const notesTextarea = document.getElementById('notes');
                if (notesTextarea) notesTextarea.value = '';
                localStorage.setItem('smash_notes_pro', '');
                // Persistir novo estado
                persistData();
                // Caso o modo edição esteja ativo, permanece, mas render atualiza
                render();
                closeModal();
            };
            openModal();
        }
        
        // ---- MODAIS DINÂMICOS (CRUD) ----
        function openModal() {
            document.getElementById('modal-container').classList.add('active');
        }
        function closeModal() {
            document.getElementById('modal-container').classList.remove('active');
        }

        // Categoria (nova ou editar)
        function openCategoryModal(catId = null) {
            const category = catId ? inventory.find(c => c.id === catId) : null;
            document.getElementById('modal-title').innerText = catId ? '✏️ Editar Categoria' : '➕ Nova Categoria';
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome da categoria</label>
                    <input type="text" id="modal-input" value="${category ? escapeHtml(category.name) : ''}" 
                           class="w-full h-14 bg-black/40 border border-white/15 px-5 rounded-xl text-white outline-none focus:border-yellow-500 text-base"
                           placeholder="ex: 🧂 Temperos Especiais" autocomplete="off">
                </div>
            `;
            const confirmBtn = document.getElementById('modal-confirm');
            confirmBtn.onclick = () => {
                const newName = document.getElementById('modal-input').value.trim();
                if (!newName) return;
                if (catId) {
                    category.name = newName;
                } else {
                    const newId = Date.now();
                    inventory.push({ id: newId, name: newName, items: [] });
                }
                persistData();
                closeModal();
                render();
            };
            openModal();
        }

        // Item: adicionar ou renomear
        function openItemModal(catId, oldItemName = null) {
            const category = inventory.find(c => c.id === catId);
            if (!category) return;
            const isEditing = (oldItemName !== null);
            document.getElementById('modal-title').innerText = isEditing ? '✏️ Renomear Item' : '✨ Adicionar Item';
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome do item</label>
                    <input type="text" id="modal-input" value="${isEditing ? escapeHtml(oldItemName) : ''}" 
                           class="w-full h-14 bg-black/40 border border-white/15 px-5 rounded-xl text-white outline-none focus:border-yellow-500"
                           placeholder="Ex: Cebola crispy" autocomplete="off">
                </div>
            `;
            document.getElementById('modal-confirm').onclick = () => {
                const newItemName = document.getElementById('modal-input').value.trim();
                if (!newItemName) return;
                
                if (isEditing) {
                    // Renomear mantendo contagem
                    const oldKey = `${catId}-${oldItemName}`;
                    const newKey = `${catId}-${newItemName}`;
                    if (counts[oldKey] !== undefined) {
                        counts[newKey] = counts[oldKey];
                        delete counts[oldKey];
                    }
                    const index = category.items.indexOf(oldItemName);
                    if (index !== -1) category.items[index] = newItemName;
                } else {
                    if (!category.items.includes(newItemName)) {
                        category.items.push(newItemName);
                    }
                }
                persistData();
                closeModal();
                render();
            };
            openModal();
        }

        // Deletar categoria
        function confirmDeleteCategory(catId) {
            const cat = inventory.find(c => c.id === catId);
            if (!cat) return;
            document.getElementById('modal-title').innerText = '⚠️ Apagar Categoria';
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center text-sm text-gray-300 space-y-3">
                    <i class="fas fa-trash-alt text-3xl text-red-400 opacity-70"></i>
                    <p>Remover <strong class="text-white">${escapeHtml(cat.name)}</strong>? <br> <span class="text-red-400 text-xs">Todos os itens e contagens serão eliminados.</span></p>
                </div>
            `;
            document.getElementById('modal-confirm').onclick = () => {
                // apagar contagens relacionadas
                cat.items.forEach(item => {
                    delete counts[`${cat.id}-${item}`];
                });
                inventory = inventory.filter(c => c.id !== catId);
                persistData();
                closeModal();
                render();
            };
            openModal();
        }

        function confirmDeleteItem(catId, itemName) {
            document.getElementById('modal-title').innerText = '❌ Remover Item';
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center">
                    <p class="text-gray-200 text-sm">Tem certeza que deseja excluir <strong class="text-yellow-400">${escapeHtml(itemName)}</strong>?</p>
                    <p class="text-xs text-gray-500 mt-1">A contagem associada será zerada.</p>
                </div>
            `;
            document.getElementById('modal-confirm').onclick = () => {
                const category = inventory.find(c => c.id === catId);
                if (category) {
                    category.items = category.items.filter(i => i !== itemName);
                    delete counts[`${catId}-${itemName}`];
                    persistData();
                }
                closeModal();
                render();
            };
            openModal();
        }

        // Envio para WhatsApp
        function sendToWhatsApp() {
            const notes = document.getElementById('notes').value;
            const now = new Date();
            const formattedDate = now.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const formattedTime = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
            
            let message = `🍔 *SMASH IT PRO - CONTAGEM* 🍔\n📅 ${formattedDate}  •  ⏰ ${formattedTime}\n━━━━━━━━━━━━━━━━━━━━\n`;
            let hasStock = false;

            inventory.forEach(cat => {
                let catSection = `\n*${cat.name.toUpperCase()}*\n`;
                let catHas = false;
                cat.items.forEach(item => {
                    const qty = counts[`${cat.id}-${item}`] || 0;
                    if (qty > 0) {
                        catSection += `▸ ${item}: *${qty}* un.\n`;
                        catHas = true;
                        hasStock = true;
                    }
                });
                if (catHas) message += catSection + `\n`;
            });

            if (!hasStock) {
                alert("⚠️ Nenhum item com quantidade > 0. Adicione números antes de gerar o relatório.");
                return;
            }

            if (notes.trim().length > 0) {
                message += `\n📌 *NOTAS DO OPERADOR:*\n${notes.trim()}\n`;
            }
            message += `\n🔁 Relatório gerado via Smash Contagem`;

            const encoded = encodeURIComponent(message);
            const waUrl = `https://wa.me/?text=${encoded}`;
            window.open(waUrl, '_blank');
        }

        // Inicialização e eventos
        window.onload = () => {
            loadNotes();
            render();
            // Garantir que se inventory foi atualizado externamente, renderize
            window.addEventListener('storage', (e) => {
                if (e.key === 'smash_inventory_pro' || e.key === 'smash_counts_pro') {
                    inventory = JSON.parse(localStorage.getItem('smash_inventory_pro')) || JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
                    counts = JSON.parse(localStorage.getItem('smash_counts_pro')) || {};
                    render();
                }
            });
        };
    </script>
</body>
</html>
