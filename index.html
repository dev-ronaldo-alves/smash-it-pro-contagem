<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/svg+xml" href="https://emojicdn.elk.sh/🍔">
    <title>Smash It - Pro Contagem | Gestão de Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Tema escuro (padrão) */
        :root {
            --smash-yellow: #facc15;
            --bg-gradient-start: #0b0b0b;
            --bg-gradient-end: #000000;
            --text-primary: #f1f5f9;
            --card-bg: rgba(15, 15, 20, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(0, 0, 0, 0.9);
            --footer-gradient: linear-gradient(to top, black, rgba(0,0,0,0.95), transparent);
            --modal-bg: rgba(0, 0, 0, 0.92);
        }
        
        /* Tema claro */
        body.light-theme {
            --bg-gradient-start: #fef9e8;
            --bg-gradient-end: #fff4e0;
            --text-primary: #1e1b1a;
            --card-bg: rgba(255, 248, 235, 0.85);
            --card-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
            --input-border: rgba(0, 0, 0, 0.15);
            --header-bg: rgba(255, 248, 235, 0.95);
            --footer-gradient: linear-gradient(to top, #fff4e0, rgba(255,244,224,0.95), transparent);
            --modal-bg: rgba(255, 248, 235, 0.98);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            transition: background 0.2s ease, color 0.2s ease;
        }
        
        html { scroll-behavior: smooth; }
        .brand-font { font-family: 'Bangers', cursive; letter-spacing: 2px; text-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        
        .card-glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .card-glass:hover { border-color: rgba(250, 204, 21, 0.4); background: var(--card-bg); }
        
        .btn-smash {
            background: linear-gradient(105deg, #facc15 0%, #eab308 100%);
            color: #0c0a2a;
            font-weight: 800;
            transition: transform 0.15s ease, box-shadow 0.2s;
            box-shadow: 0 8px 20px -6px rgba(250, 204, 21, 0.2);
        }
        .btn-smash:active { transform: scale(0.97); box-shadow: 0 4px 12px -4px rgba(250, 204, 21, 0.4); }
        
        .modal, .calculator-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--modal-bg);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal.active, .calculator-modal.active { display: flex; animation: modalFade 0.25s ease-out; }
        @keyframes modalFade { from { opacity: 0; backdrop-filter: blur(0px);} to { opacity: 1; backdrop-filter: blur(10px);} }
        
        .animate-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        .edit-active { background: #facc15 !important; color: black !important; transform: rotate(90deg); box-shadow: 0 0 0 2px rgba(250,204,21,0.3); }
        .eye-btn { transition: all 0.1s ease; cursor: pointer; opacity: 0.7; }
        .eye-btn:hover { opacity: 1; transform: scale(1.05); }
        .eye-btn:active { transform: scale(0.95); }
        
        /* Ajustes específicos tema claro */
        body.light-theme .card-glass { backdrop-filter: blur(8px); }
        body.light-theme input, body.light-theme textarea { color: #1e1b1a; }
        body.light-theme .bg-black/30 { background: rgba(0,0,0,0.08); }
        body.light-theme .bg-black/40 { background: rgba(0,0,0,0.05); }
        body.light-theme .border-white/10 { border-color: rgba(0,0,0,0.1); }
        body.light-theme .bg-white/5 { background: rgba(0,0,0,0.05); }
        body.light-theme .text-gray-300 { color: #4a4a4a; }
        body.light-theme .text-gray-400 { color: #6b6b6b; }
        body.light-theme .text-gray-500 { color: #8a8a8a; }
        body.light-theme .bg-black/90 { background: rgba(255,248,235,0.95); }
        body.light-theme .border-b-white\/10 { border-bottom-color: rgba(0,0,0,0.1); }
        body.light-theme .bg-gradient-to-t { background: var(--footer-gradient); }
        body.light-theme .placeholder-gray-500::placeholder { color: #aaa; }
        body.light-theme .modal .card-glass { background: var(--card-bg); border-color: rgba(250,204,21,0.4); }
        
        /* Botões da segunda linha */
        .reset-buttons-row {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
        @media (max-width: 480px) {
            .reset-buttons-row { gap: 0.5rem; }
        }
        /* estilo para itens ocultos no modal de minimizados */
        .hidden-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 0.8rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
        }
        body.light-theme .hidden-item-row {
            background: rgba(0,0,0,0.05);
        }

        /* Estilos da calculadora */
        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .calc-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1.5rem;
            padding: 1rem 0;
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            color: var(--text-primary);
        }
        .calc-btn:active { transform: scale(0.96); background: rgba(250,204,21,0.3); }
        .calc-btn-oper { background: rgba(250,204,21,0.2); color: #facc15; }
        .calc-btn-equal { background: #facc15; color: #0c0a2a; }
        .calc-btn-clear { background: rgba(239,68,68,0.2); color: #ef4444; }
        .calculator-screen {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            font-size: 2rem;
            font-weight: 600;
            text-align: right;
            letter-spacing: 2px;
            font-family: monospace;
            overflow-x: auto;
            white-space: nowrap;
        }
        body.light-theme .calc-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
        body.light-theme .calc-btn-oper { background: rgba(250,204,21,0.3); }
    </style>
</head>
<body class="min-h-screen pb-44 antialiased">

<header class="sticky top-0 z-50 bg-black/90 backdrop-blur-2xl border-b border-white/10 shadow-lg" style="background: var(--header-bg); border-bottom-color: var(--card-border);">
    <div class="max-w-xl mx-auto px-4 pt-5 pb-3">
        <!-- Primeira linha: título + botões tema, alternar app, edição e itens minimizados -->
        <div class="flex justify-between items-center mb-2">
            <div class="flex items-baseline gap-2">
                <h1 class="text-4xl btn-smash px-4 py-1 rounded-2xl shadow-md brand-font tracking-wider">SMASH IT</h1>
                <span class="text-[10px] font-bold text-yellow-500/80 uppercase tracking-[0.3em]">pro</span>
            </div>
            <div class="flex gap-3">
                <!-- Botão para alternar para o app de Gestão de Preços -->
                <button onclick="switchToPriceManager()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50" title="Alternar para Gestão de Preços">
                    <i class="fas fa-arrow-right-arrow-left text-base"></i>
                </button>
                <!-- Botão de alternância de tema -->
                <button id="btn-theme-toggle" onclick="toggleTheme()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50">
                    <i id="theme-icon" class="fas fa-moon text-base"></i>
                </button>
                <!-- Botão para abrir calculadora -->
                <button onclick="openCalculator()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50" title="Calculadora Popup">
                    <i class="fas fa-calculator text-base"></i>
                </button>
                <!-- Botão para gestão de itens/categorias minimizados (ocultos) -->
                <button onclick="showHiddenItemsModal()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50" title="Gerir itens minimizados (ocultos)">
                    <i class="fas fa-eye-slash text-base"></i>
                </button>
                <button id="btn-edit-mode" onclick="toggleEditMode()" class="w-11 h-11 rounded-full bg-white/5 flex items-center justify-center text-gray-300 border border-white/15 transition-all duration-300 hover:border-yellow-500/50">
                    <i class="fas fa-cog text-base"></i>
                </button>
            </div>
        </div>
        
        <!-- Segunda linha: botões de limpar e reset total (alinhados à direita) -->
        <div class="reset-buttons-row">
            <button onclick="confirmClearChecked()" class="w-11 h-11 rounded-full bg-amber-600/20 text-amber-400 flex items-center justify-center border border-amber-500/40 hover:bg-amber-500/30 transition-all" title="Limpar todas as quantidades">
                <i class="fas fa-eraser text-base"></i>
            </button>
            <button onclick="confirmFullReset()" class="w-11 h-11 rounded-full bg-red-600/20 text-red-400 flex items-center justify-center border border-red-500/40 hover:bg-red-500/30 transition-all" title="Redefinir tudo - categorias originais">
                <i class="fas fa-arrow-rotate-left text-base"></i>
            </button>
        </div>
        
        <!-- Barra de pesquisa (mantida abaixo) -->
        <div class="relative mt-3">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="search-input" oninput="render()" placeholder="🔎 Pesquisar item ou categoria..." class="w-full bg-white/5 border border-white/10 h-12 pl-12 pr-5 rounded-2xl outline-none text-sm focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500/50 transition-all" style="background: var(--input-bg); border-color: var(--input-border); color: var(--text-primary);">
        </div>
    </div>
</header>

<main class="max-w-xl mx-auto px-4 py-5 space-y-8">
    <div id="management-zone" class="hidden animate-in bg-yellow-500/5 border border-yellow-500/25 rounded-3xl p-5 backdrop-blur-sm">
        <div class="flex items-center gap-2 mb-3"><i class="fas fa-screwdriver-wrench text-yellow-400 text-sm"></i><h3 class="text-yellow-400 text-[11px] font-black uppercase tracking-[0.2rem]">Modo Gestão</h3></div>
        <button onclick="openCategoryModal()" class="w-full bg-yellow-500 text-black font-extrabold py-3.5 rounded-xl text-xs uppercase tracking-wider flex items-center justify-center gap-2 shadow-md active:scale-[0.98] transition"><i class="fas fa-layer-group"></i> Criar nova categoria</button>
        <p class="text-[10px] text-gray-400 text-center mt-3">✦ Toque nos itens para editar ou adicionar</p>
    </div>

    <div id="inventory-container" class="space-y-8"></div>

    <div class="card-glass rounded-3xl p-5 mt-4">
        <div class="flex items-center gap-3 mb-3 px-1"><div class="w-6 h-6 rounded-full bg-yellow-500/20 flex items-center justify-center"><i class="fas fa-sticky-note text-yellow-400 text-[11px]"></i></div><label class="font-bold uppercase text-[10px] tracking-[0.2em] text-gray-400">Relatório / Observações</label></div>
        <textarea id="notes" rows="3" oninput="saveNotes()" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 focus:border-yellow-500/60 outline-none text-white/90 text-sm resize-none placeholder:text-gray-500" style="background: var(--input-bg); border-color: var(--input-border); color: var(--text-primary);" placeholder="📝 Ex: Urgente reabastecer pães, promoção smash duplo..."></textarea>
    </div>
</main>

<div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-black via-black/95 to-transparent z-40" style="background: var(--footer-gradient);">
    <div class="max-w-xl mx-auto">
        <button onclick="sendToWhatsApp()" class="w-full btn-smash font-bold h-16 rounded-2xl text-sm uppercase tracking-[0.15em] flex items-center justify-center gap-3 shadow-2xl shadow-yellow-500/20 active:scale-[0.98] transition-all"><i class="fab fa-whatsapp text-2xl"></i> GERAR RELATÓRIO & ENVIAR</button>
    </div>
</div>

<!-- Modal genérico (para ações diversas) -->
<div id="modal-container" class="modal px-5">
    <div class="card-glass p-6 rounded-[2.5rem] w-full max-w-sm border border-yellow-500/30 shadow-2xl animate-in">
        <div class="text-center mb-2"><h3 id="modal-title" class="text-2xl font-black text-yellow-500 brand-font uppercase tracking-wide">Ação</h3><div class="w-12 h-0.5 bg-yellow-500/50 mx-auto mt-1 rounded-full"></div></div>
        <div id="modal-content" class="space-y-5 my-4" style="max-height: 60vh; overflow-y: auto;"></div>
        <div class="flex gap-3 mt-4"><button onclick="closeModal()" class="flex-1 h-12 bg-white/10 rounded-xl font-bold text-gray-300 text-xs uppercase tracking-wider hover:bg-white/15 transition">Cancelar</button><button id="modal-confirm" class="flex-1 btn-smash h-12 rounded-xl font-bold text-xs uppercase tracking-wider shadow-md">Confirmar</button></div>
    </div>
</div>

<!-- Modal da Calculadora (popup independente) -->
<div id="calculator-modal" class="calculator-modal px-5">
    <div class="card-glass p-5 rounded-[2.5rem] w-full max-w-sm border border-yellow-500/30 shadow-2xl animate-in">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-black text-yellow-500 brand-font">Calculadora</h3>
            <button onclick="closeCalculator()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-gray-400 hover:text-yellow-400 transition"><i class="fas fa-times"></i></button>
        </div>
        <div class="calculator-screen" id="calc-screen">0</div>
        <div class="calculator-buttons">
            <div class="calc-btn calc-btn-clear" onclick="calcClear()">C</div>
            <div class="calc-btn calc-btn-oper" onclick="calcAppend('/')">÷</div>
            <div class="calc-btn calc-btn-oper" onclick="calcAppend('*')">×</div>
            <div class="calc-btn calc-btn-oper" onclick="calcBackspace()">⌫</div>
            
            <div class="calc-btn" onclick="calcAppend('7')">7</div>
            <div class="calc-btn" onclick="calcAppend('8')">8</div>
            <div class="calc-btn" onclick="calcAppend('9')">9</div>
            <div class="calc-btn calc-btn-oper" onclick="calcAppend('-')">-</div>
            
            <div class="calc-btn" onclick="calcAppend('4')">4</div>
            <div class="calc-btn" onclick="calcAppend('5')">5</div>
            <div class="calc-btn" onclick="calcAppend('6')">6</div>
            <div class="calc-btn calc-btn-oper" onclick="calcAppend('+')">+</div>
            
            <div class="calc-btn" onclick="calcAppend('1')">1</div>
            <div class="calc-btn" onclick="calcAppend('2')">2</div>
            <div class="calc-btn" onclick="calcAppend('3')">3</div>
            <div class="calc-btn calc-btn-equal" onclick="calcResult()">=</div>
            
            <div class="calc-btn" onclick="calcAppend('0')">0</div>
            <div class="calc-btn" onclick="calcAppend('.')">.</div>
            <div class="calc-btn" onclick="calcAppend('00')">00</div>
            <div class="calc-btn calc-btn-oper" onclick="calcClear()">AC</div>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-4">✦ Toque nos botões para fazer contas rápidas</p>
    </div>
</div>

<script>
    // ---------- DADOS PADRÃO (compatível com novo formato de visibilidade) ----------
    const DEFAULT_CATEGORIES_RAW = [
        { id: 101, name: "🍔 Pães Artesanais", items: ["Pão Batata", "Pão Pimenta", "Pão Esmagadinho", "Outros"] },
        { id: 102, name: "🥩 Proteínas Smash", items: ["Carne 100g Caixa", "Carne Pacote", "Blend de Queijos", "Frango Empanado", "Bacon Pacote", "Presunto Pacote", "Ovos Bandeja"] },
        { id: 103, name: "🥬 Frescos & Veg", items: ["Alface", "Tomate Unidade", "Cebola Caramelizada", "Picles Caseiros", "Veggie", "Futuro"] },
        { id: 104, name: "🧀 Queijos e Molhos", items: ["Cheddar Barra", "Cheddar Caixa", "Prato Barra", "Prato Caixa", "Mussarela Pacote", "Mussarela Barra", "Molho Gravy", "Molho Heinzen", "Molho de Pimenta", "Maionese da Casa"] },
        { id: 105, name: "🍟 Acompanhamentos", items: ["Batata Palito Porção", "Batata Palito Pacote", "Batata Canoa Porção", "Batata Canoa Pacote", "Batata Doce Chips Porção", "Batata Doce Chips Caixa"] },
        { id: 106, name: "🍮 Sobremesas", items: ["Pudim Brullet", "Brownie"] },
        { id: 107, name: "🧂 Temperos & Extras", items: ["Manteiga Tablets", "Manteiga Barra", "Óleo Frasco", "Óleo Balde", "Sal 1kg", "Pimenta", "Alho", "Cebolinha", "Salsa"] }
    ];

    // Converte para formato com visibilidade (categoria.visible e itens como objetos {name, visible})
    function convertToVisibilityFormat(categories) {
        return categories.map(cat => ({
            id: cat.id,
            name: cat.name,
            visible: cat.visible !== undefined ? cat.visible : true,
            items: (cat.items || []).map(item => {
                if (typeof item === 'string') return { name: item, visible: true };
                return { name: item.name, visible: item.visible !== undefined ? item.visible : true };
            })
        }));
    }

    let inventory = [];
    let counts = {};
    let isEditMode = false;

    // Carregar / inicializar dados
    function loadData() {
        let stored = localStorage.getItem('smash_inventory_pro');
        if (stored) {
            try {
                let parsed = JSON.parse(stored);
                inventory = convertToVisibilityFormat(parsed);
            } catch(e) { inventory = convertToVisibilityFormat(DEFAULT_CATEGORIES_RAW); }
        } else {
            inventory = convertToVisibilityFormat(DEFAULT_CATEGORIES_RAW);
        }
        counts = JSON.parse(localStorage.getItem('smash_counts_pro')) || {};
    }

    function persistData() {
        localStorage.setItem('smash_inventory_pro', JSON.stringify(inventory));
        localStorage.setItem('smash_counts_pro', JSON.stringify(counts));
    }

    function saveNotes() { localStorage.setItem('smash_notes_pro', document.getElementById('notes').value); }
    function loadNotes() { let n = localStorage.getItem('smash_notes_pro'); if(n !== null) document.getElementById('notes').value = n; }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('btn-edit-mode');
        const zone = document.getElementById('management-zone');
        if(isEditMode) { btn.classList.add('edit-active'); zone.classList.remove('hidden'); }
        else { btn.classList.remove('edit-active'); zone.classList.add('hidden'); }
        render();
    }

    // Alternar visibilidade da categoria
    function toggleCategoryVisibility(catId) {
        const cat = inventory.find(c => c.id === catId);
        if(cat) { cat.visible = !cat.visible; persistData(); render(); }
    }

    // Alternar visibilidade do item
    function toggleItemVisibility(catId, itemName) {
        const cat = inventory.find(c => c.id === catId);
        if(cat) {
            const item = cat.items.find(i => i.name === itemName);
            if(item) { item.visible = !item.visible; persistData(); render(); }
        }
    }

    // Nova função: modal para gerenciar itens minimizados (ocultos)
    function showHiddenItemsModal() {
        // Coleta categorias invisíveis e itens invisíveis (de categorias visíveis ou não)
        const hiddenCategories = inventory.filter(cat => !cat.visible);
        const hiddenItems = [];
        inventory.forEach(cat => {
            cat.items.forEach(item => {
                if (!item.visible) {
                    hiddenItems.push({ catId: cat.id, catName: cat.name, itemName: item.name });
                }
            });
        });
        
        if (hiddenCategories.length === 0 && hiddenItems.length === 0) {
            document.getElementById('modal-title').innerText = '📦 Minimizados';
            document.getElementById('modal-content').innerHTML = `<div class="text-center py-6"><i class="fas fa-check-circle text-3xl text-green-400 mb-3"></i><p class="text-sm">Não há itens ou categorias minimizados.</p><p class="text-xs text-gray-400 mt-2">Os itens com olho fechado aparecerão aqui.</p></div>`;
            document.getElementById('modal-confirm').onclick = () => closeModal();
            openModal();
            return;
        }
        
        let html = `<div class="space-y-4"><p class="text-xs text-center text-gray-400">👁️ Itens/categorias com olho fechado ficam minimizados (ocultos da tela principal).</p>`;
        
        if (hiddenCategories.length) {
            html += `<div><div class="text-[11px] font-bold text-yellow-500 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fas fa-layer-group"></i>Categorias minimizadas</div>`;
            hiddenCategories.forEach(cat => {
                html += `
                    <div class="hidden-item-row">
                        <span class="text-sm font-medium truncate">${escapeHtml(cat.name)}</span>
                        <button onclick="restoreCategoryVisibility(${cat.id})" class="bg-yellow-500/20 hover:bg-yellow-500/40 px-3 py-1 rounded-full text-xs font-bold transition"><i class="fas fa-eye mr-1"></i>Tornar visível</button>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        if (hiddenItems.length) {
            html += `<div><div class="text-[11px] font-bold text-yellow-500 uppercase tracking-wider mb-2 flex items-center gap-2 mt-2"><i class="fas fa-box"></i>Itens minimizados</div>`;
            hiddenItems.forEach(item => {
                html += `
                    <div class="hidden-item-row">
                        <div class="flex flex-col">
                            <span class="text-sm font-medium">${escapeHtml(item.itemName)}</span>
                            <span class="text-[10px] text-gray-400">${escapeHtml(item.catName)}</span>
                        </div>
                        <button onclick="restoreItemVisibility(${item.catId}, '${escapeHtml(item.itemName)}')" class="bg-yellow-500/20 hover:bg-yellow-500/40 px-3 py-1 rounded-full text-xs font-bold transition"><i class="fas fa-eye mr-1"></i>Mostrar</button>
                    </div>
                `;
            });
            html += `</div>`;
        }
        
        html += `</div>`;
        document.getElementById('modal-title').innerText = '🗂️ Minimizados (Ocultos)';
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-confirm').innerText = 'Fechar';
        document.getElementById('modal-confirm').onclick = () => closeModal();
        openModal();
    }
    
    // Funções auxiliares para restaurar visibilidade via modal
    function restoreCategoryVisibility(catId) {
        const cat = inventory.find(c => c.id === catId);
        if (cat) { cat.visible = true; persistData(); render(); }
        closeModal();
        showHiddenItemsModal(); // recarrega modal atualizado
    }
    
    function restoreItemVisibility(catId, itemName) {
        const cat = inventory.find(c => c.id === catId);
        if (cat) {
            const item = cat.items.find(i => i.name === itemName);
            if (item) { item.visible = true; persistData(); render(); }
        }
        closeModal();
        showHiddenItemsModal(); // recarrega modal atualizado
    }

    // RENDER MODIFICADO: APENAS CATEGORIAS VISÍVEIS E ITENS VISÍVEIS SÃO MOSTRADOS NA TELA PRINCIPAL
    function render() {
        const container = document.getElementById('inventory-container');
        if (!container) return;
        const searchTerm = document.getElementById('search-input')?.value.toLowerCase().trim() || '';
        container.innerHTML = '';

        // Filtrar categorias visíveis
        const visibleCategories = inventory.filter(cat => cat.visible === true);
        
        visibleCategories.forEach(category => {
            // Filtrar itens visíveis dentro da categoria
            let visibleItems = category.items.filter(item => item.visible === true);
            
            // Aplicar pesquisa sobre os itens visíveis e nome da categoria
            let filteredItems = [];
            const categoryMatches = category.name.toLowerCase().includes(searchTerm);
            
            if (categoryMatches) {
                filteredItems = [...visibleItems];
            } else if (searchTerm !== "") {
                filteredItems = visibleItems.filter(item => item.name.toLowerCase().includes(searchTerm));
            } else {
                filteredItems = [...visibleItems];
            }
            
            if (filteredItems.length === 0) return;
            
            const catDiv = document.createElement('div');
            catDiv.className = 'animate-in space-y-3';
            const eyeIconCat = category.visible ? 'fa-eye' : 'fa-eye-slash';
            const eyeTitle = category.visible ? 'Visível no relatório e na tela' : 'Oculto (minimizado)';
            let headerHtml = `
                <div class="flex justify-between items-center px-1 pb-1">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-tag text-yellow-500/70 text-[10px]"></i>
                        <h2 class="text-yellow-500 font-extrabold uppercase text-[11px] tracking-[0.2em]">${escapeHtml(category.name)}</h2>
                        <button onclick="toggleCategoryVisibility(${category.id})" class="eye-btn text-gray-400 hover:text-yellow-400 transition ml-1" title="${eyeTitle}">
                            <i class="fas ${eyeIconCat} text-xs"></i>
                        </button>
                    </div>
            `;
            if (isEditMode) {
                headerHtml += `
                    <div class="flex gap-3 text-[9px] font-black uppercase tracking-tight">
                        <button onclick="openItemModal(${category.id})" class="text-emerald-400 hover:text-emerald-300 transition"><i class="fas fa-plus-circle"></i> Item</button>
                        <button onclick="openCategoryModal(${category.id})" class="text-blue-400 hover:text-blue-300"><i class="fas fa-pen"></i></button>
                        <button onclick="confirmDeleteCategory(${category.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash-can"></i></button>
                    </div>
                `;
            }
            headerHtml += `</div>`;
            let itemsHtml = `<div class="grid gap-2.5">`;
            filteredItems.forEach(item => {
                const key = `${category.id}-${item.name}`;
                const quantity = counts[key] || 0;
                const itemEyeIcon = item.visible ? 'fa-eye' : 'fa-eye-slash';
                const itemEyeTitle = item.visible ? 'Visível no relatório e na tela' : 'Oculto (minimizado)';
                itemsHtml += `
                    <div class="card-glass p-4 rounded-2xl flex items-center justify-between group transition-all">
                        <div class="flex flex-col gap-0.5 flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-semibold text-[15px] tracking-tight" style="color: var(--text-primary);">${escapeHtml(item.name)}</span>
                                <button onclick="toggleItemVisibility(${category.id}, '${escapeHtml(item.name)}')" class="eye-btn text-gray-400 hover:text-yellow-400 transition" title="${itemEyeTitle}">
                                    <i class="fas ${itemEyeIcon} text-[11px]"></i>
                                </button>
                            </div>
                            ${isEditMode ? `
                                <div class="flex gap-4 mt-0.5">
                                    <button onclick="openItemModal(${category.id}, '${escapeHtml(item.name)}')" class="text-[9px] font-black uppercase text-blue-400/70 hover:text-blue-400 transition">✎ Renomear</button>
                                    <button onclick="confirmDeleteItem(${category.id}, '${escapeHtml(item.name)}')" class="text-[9px] font-black uppercase text-red-400/70 hover:text-red-400 transition">🗑 Remover</button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex items-center gap-3 rounded-2xl p-1.5" style="background: var(--input-bg);">
                            <button onclick="updateCount('${key}', -1)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center active:bg-red-500/20 transition-all text-gray-300"><i class="fas fa-minus text-xs"></i></button>
                            <input type="number" value="${quantity}" onchange="manualUpdate('${key}', this.value)" class="w-12 bg-transparent text-center font-bold text-yellow-500 focus:outline-none text-xl" id="input-${key}" inputmode="numeric">
                            <button onclick="updateCount('${key}', 1)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center active:bg-green-500/20 transition-all text-gray-300"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                `;
            });
            itemsHtml += `</div>`;
            catDiv.innerHTML = headerHtml + itemsHtml;
            container.appendChild(catDiv);
        });

        if (container.children.length === 0) {
            container.innerHTML = `<div class="text-center py-12 text-gray-400 text-sm card-glass rounded-3xl p-8"><i class="fas fa-box-open text-4xl mb-3 opacity-50"></i><p>Nenhum item visível.</p><p class="text-xs mt-2">🔍 Use o botão de olho cortado para gerir itens minimizados.</p></div>`;
        }
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;').replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, c=>c); }

    function updateCount(key, delta) { let cur = counts[key]||0; let nv = Math.max(0, cur+delta); counts[key]=nv; let inp = document.getElementById(`input-${key}`); if(inp) inp.value=nv; persistData(); }
    function manualUpdate(key, valStr) { let raw = parseInt(valStr,10); if(isNaN(raw)) raw=0; counts[key]=Math.max(0,raw); persistData(); let inp = document.getElementById(`input-${key}`); if(inp) inp.value=counts[key]; }

    function confirmClearChecked() {
        document.getElementById('modal-title').innerText = '🧹 Limpar Quantidades';
        document.getElementById('modal-content').innerHTML = `<div class="text-center space-y-2"><i class="fas fa-broom-ball text-3xl text-amber-400"></i><p class="text-sm font-medium">Apagar TODOS os números de stock?</p><p class="text-[11px] text-gray-400">As contagens de todos os itens voltarão a zero.<br>Categorias e itens permanecem intactos.</p></div>`;
        document.getElementById('modal-confirm').onclick = () => { counts = {}; persistData(); closeModal(); render(); };
        openModal();
    }

    function confirmFullReset() {
        document.getElementById('modal-title').innerText = '⚠️ RESET COMPLETO';
        document.getElementById('modal-content').innerHTML = `<div class="text-center space-y-3"><i class="fas fa-database text-3xl text-red-500 animate-pulse"></i><p class="text-sm font-bold text-white">Redefinir para configurações originais?</p><div class="bg-red-500/10 p-3 rounded-xl text-left text-[12px]"><i class="fas fa-circle-info text-red-400 mr-1"></i> Isto irá:<br>• Restaurar categorias e itens padrão<br>• Zerar TODAS as quantidades contadas<br>• Limpar notas/observações<br>• Remover categorias/itens personalizados</div></div>`;
        document.getElementById('modal-confirm').onclick = () => {
            inventory = convertToVisibilityFormat(DEFAULT_CATEGORIES_RAW);
            counts = {};
            document.getElementById('notes').value = '';
            localStorage.setItem('smash_notes_pro', '');
            persistData();
            render();
            closeModal();
        };
        openModal();
    }

    function openModal() { document.getElementById('modal-container').classList.add('active'); }
    function closeModal() { document.getElementById('modal-container').classList.remove('active'); }

    function openCategoryModal(catId = null) {
        const category = catId ? inventory.find(c => c.id === catId) : null;
        document.getElementById('modal-title').innerText = catId ? '✏️ Editar Categoria' : '➕ Nova Categoria';
        document.getElementById('modal-content').innerHTML = `<div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome da categoria</label><input type="text" id="modal-input" value="${category ? escapeHtml(category.name) : ''}" class="w-full h-14 bg-black/40 border border-white/15 px-5 rounded-xl text-white outline-none focus:border-yellow-500 text-base" placeholder="ex: 🧂 Temperos Especiais" autocomplete="off"></div>`;
        document.getElementById('modal-confirm').onclick = () => {
            let newName = document.getElementById('modal-input').value.trim();
            if(!newName) return;
            if(catId) {
                category.name = newName;
            } else {
                let newId = Date.now();
                inventory.push({ id: newId, name: newName, visible: true, items: [{ name: "Produto 1", visible: true }, { name: "Produto 2", visible: true }, { name: "Produto 3", visible: true }] });
            }
            persistData(); closeModal(); render();
        };
        openModal();
    }

    function openItemModal(catId, oldItemName = null) {
        const category = inventory.find(c => c.id === catId);
        if(!category) return;
        const isEditing = (oldItemName !== null);
        document.getElementById('modal-title').innerText = isEditing ? '✏️ Renomear Item' : '✨ Adicionar Item';
        document.getElementById('modal-content').innerHTML = `<div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome do item</label><input type="text" id="modal-input" value="${isEditing ? escapeHtml(oldItemName) : ''}" class="w-full h-14 bg-black/40 border border-white/15 px-5 rounded-xl text-white outline-none focus:border-yellow-500" placeholder="Ex: Cebola crispy" autocomplete="off"></div>`;
        document.getElementById('modal-confirm').onclick = () => {
            let newName = document.getElementById('modal-input').value.trim();
            if(!newName) return;
            if(isEditing) {
                const oldKey = `${catId}-${oldItemName}`;
                const newKey = `${catId}-${newName}`;
                if(counts[oldKey] !== undefined) { counts[newKey] = counts[oldKey]; delete counts[oldKey]; }
                const itemObj = category.items.find(i => i.name === oldItemName);
                if(itemObj) itemObj.name = newName;
            } else {
                if(!category.items.some(i => i.name === newName)) category.items.push({ name: newName, visible: true });
            }
            persistData(); closeModal(); render();
        };
        openModal();
    }

    function confirmDeleteCategory(catId) {
        const cat = inventory.find(c => c.id === catId);
        if(!cat) return;
        document.getElementById('modal-title').innerText = '⚠️ Apagar Categoria';
        document.getElementById('modal-content').innerHTML = `<div class="text-center text-sm text-gray-300 space-y-3"><i class="fas fa-trash-alt text-3xl text-red-400 opacity-70"></i><p>Remover <strong class="text-white">${escapeHtml(cat.name)}</strong>? <br> <span class="text-red-400 text-xs">Todos os itens e contagens serão eliminados.</span></p></div>`;
        document.getElementById('modal-confirm').onclick = () => {
            cat.items.forEach(item => delete counts[`${cat.id}-${item.name}`]);
            inventory = inventory.filter(c => c.id !== catId);
            persistData(); closeModal(); render();
        };
        openModal();
    }

    function confirmDeleteItem(catId, itemName) {
        document.getElementById('modal-title').innerText = '❌ Remover Item';
        document.getElementById('modal-content').innerHTML = `<div class="text-center"><p class="text-gray-200 text-sm">Tem certeza que deseja excluir <strong class="text-yellow-400">${escapeHtml(itemName)}</strong>?</p><p class="text-xs text-gray-500 mt-1">A contagem associada será zerada.</p></div>`;
        document.getElementById('modal-confirm').onclick = () => {
            const category = inventory.find(c => c.id === catId);
            if(category) {
                category.items = category.items.filter(i => i.name !== itemName);
                delete counts[`${catId}-${itemName}`];
                persistData();
            }
            closeModal(); render();
        };
        openModal();
    }

    // RELATÓRIO WHATSAPP: mantém apenas categorias e itens visíveis
    function sendToWhatsApp() {
        const notes = document.getElementById('notes').value;
        const now = new Date();
        const formattedDate = now.toLocaleDateString('pt-PT', { day:'2-digit', month:'2-digit', year:'numeric' });
        const formattedTime = now.toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
        let message = `🍔 *SMASH IT PRO - CONTAGEM* 🍔\n📅 ${formattedDate}  •  ⏰ ${formattedTime}\n━━━━━━━━━━━━━━━━━━━━\n`;
        
        inventory.forEach(cat => {
            if (!cat.visible) return;
            let catSection = `\n*${cat.name.toUpperCase()}*\n`;
            let hasVisibleItem = false;
            cat.items.forEach(item => {
                if (!item.visible) return;
                const qty = counts[`${cat.id}-${item.name}`] || 0;
                catSection += `▸ ${item.name}: *${qty}* un.\n`;
                hasVisibleItem = true;
            });
            if (hasVisibleItem) message += catSection + `\n`;
        });
        
        if (notes.trim().length > 0) message += `\n📌 *NOTAS DO OPERADOR:*\n${notes.trim()}\n`;
        message += `\n🔁 Relatório gerado via Smash Contagem`;
        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/?text=${encoded}`, '_blank');
    }

    // TEMA
    function toggleTheme() {
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        const isLight = body.classList.contains('light-theme');
        
        if (isLight) {
            body.classList.remove('light-theme');
            localStorage.setItem('smash_theme', 'dark');
            themeIcon.className = 'fas fa-moon text-base';
        } else {
            body.classList.add('light-theme');
            localStorage.setItem('smash_theme', 'light');
            themeIcon.className = 'fas fa-sun text-base';
        }
    }
    
    function loadTheme() {
        const savedTheme = localStorage.getItem('smash_theme');
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        if (savedTheme === 'light') {
            body.classList.add('light-theme');
            themeIcon.className = 'fas fa-sun text-base';
        } else {
            body.classList.remove('light-theme');
            themeIcon.className = 'fas fa-moon text-base';
        }
    }

    // ALTERNAR PARA GESTÃO DE PREÇOS
    function switchToPriceManager() {
        window.location.href = "https://dev-ronaldo-alves.github.io/smash-it-gestao-de-precos/";
    }

    // ---------- LÓGICA DA CALCULADORA POPUP ----------
    let calcExpression = "0";

    function updateCalcScreen() {
        const screen = document.getElementById('calc-screen');
        if (screen) screen.innerText = calcExpression.length > 20 ? calcExpression.slice(0, 20) + "…" : calcExpression;
    }

    function calcAppend(value) {
        if (calcExpression === "0" && !isNaN(value) && value !== '.') calcExpression = value;
        else calcExpression += value;
        // Limitar tamanho para evitar telas infinitas
        if (calcExpression.length > 30) calcExpression = calcExpression.slice(0, 30);
        updateCalcScreen();
    }

    function calcClear() {
        calcExpression = "0";
        updateCalcScreen();
    }

    function calcBackspace() {
        if (calcExpression.length === 1 || (calcExpression.length === 1 && calcExpression !== "0")) calcExpression = "0";
        else calcExpression = calcExpression.slice(0, -1);
        if (calcExpression === "") calcExpression = "0";
        updateCalcScreen();
    }

    function calcResult() {
        try {
            // Substituir operadores visuais para compatibilidade com eval
            let expr = calcExpression.replace(/×/g, '*').replace(/÷/g, '/');
            // Validar segurança (apenas números, operadores, parênteses, ponto)
            if (!/^[\d+\-*/.()\s]+$/.test(expr)) throw new Error('Expressão inválida');
            let result = eval(expr);
            // Arredondar para evitar decimais excessivos
            if (typeof result === 'number') result = parseFloat(result.toFixed(8));
            calcExpression = String(result);
            updateCalcScreen();
        } catch(e) {
            calcExpression = "Erro";
            updateCalcScreen();
            setTimeout(() => { if(calcExpression === "Erro") calcExpression = "0"; updateCalcScreen(); }, 1200);
        }
    }

    function openCalculator() {
        document.getElementById('calculator-modal').classList.add('active');
    }

    function closeCalculator() {
        document.getElementById('calculator-modal').classList.remove('active');
    }

    // Fechar modal da calculadora ao clicar fora do conteúdo (opcional)
    document.getElementById('calculator-modal')?.addEventListener('click', function(e) {
        if (e.target === this) closeCalculator();
    });

    // Inicialização
    loadData();
    window.onload = () => {
        loadNotes();
        loadTheme();
        render();
        window.addEventListener('storage', (e) => {
            if (e.key === 'smash_inventory_pro' || e.key === 'smash_counts_pro') {
                loadData();
                render();
            }
        });
    };
</script>
